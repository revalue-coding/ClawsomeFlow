[pytest]
# Single source of pytest runtime options for the monorepo.
testpaths =
    backend/tests
    tests
addopts = -ra --import-mode=importlib
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
markers =
    runtime: tests requiring deployed runtime environment
    e2e: cross-component end-to-end smoke tests
    perf: performance baseline tests
    slow: intentionally long-running test cases
