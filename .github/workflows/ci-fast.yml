name: ci-fast

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  fast-gate:
    name: fast-gate (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Match docker/test/Dockerfile: throwaway git repos need commit identity on
      # runners that ship without a global user.name/user.email.
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@clawsomeflow.local"
          git config --global user.name "ClawsomeFlow CI"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend bundle
        # backend/pyproject.toml force-includes frontend/dist into the wheel, so
        # the SPA must exist before the editable backend install runs (otherwise
        # hatchling fails: "Forced include not found: .../frontend/dist").
        run: npm --prefix frontend run build

      - name: Install backend dependencies
        run: |
          chmod +x scripts/ci-install-backend.sh
          ./scripts/ci-install-backend.sh

      - name: Run fast gate
        run: |
          chmod +x scripts/test-fast.sh
          ./scripts/test-fast.sh
