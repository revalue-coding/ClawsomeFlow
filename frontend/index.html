<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawsomeFlow</title>
    <!-- No-flash theme: apply the persisted dark/light choice before first
         paint so the page never flickers light-then-dark on load. Mirrors
         src/lib/theme.ts (localStorage["csflow-theme"], default light). -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("csflow-theme") === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          /* localStorage blocked — fall back to light */
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
